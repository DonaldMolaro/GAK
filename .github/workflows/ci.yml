name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LLVM tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang

      - name: Run full test suite
        run: make test

      - name: Run course checks
        run: make -C examples course-check

  coverage:
    name: Library coverage
    runs-on: ubuntu-latest
    env:
      CXX: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install LLVM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang

      - name: Run library coverage
        run: make coverage-lib

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lib-report
          path: |
            tests/coverage.txt
            tests/coverage.profdata
